---
- name: Create coredns config directory
  ansible.builtin.file:
    path: "{{ coredins_config_dir }}"
    state: directory
    mode: '0755'

- name: Create Corefile from template
  ansible.builtin.template:
    src: Corefile.j2
    dest: "{{ coredins_config_dir }}/Corefile"
    mode: '0644'
  notify: restart coredns

- name: Create systemd service for coredns
  ansible.builtin.template:
    src: coredns.service.j2
    dest: /etc/systemd/system/coredns.service
    mode: '0644'
  notify: restart coredns

- name: Start and enable CoreDNS
  ansible.builtin.systemd:
    name: coredns
    state: started
    enabled: yes
    daemon_reload: yes