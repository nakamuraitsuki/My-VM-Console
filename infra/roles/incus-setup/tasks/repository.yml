---
- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Zabbly Incus GPG key
  ansible.builtin.get_url:
    url: https://pkgs.zabbly.com/key.asc
    dest: "{{ incus_gpg_path }}"
    mode: '0644'

- name: Add Zabbly Incus repository
  ansible.builtin.copy:
    dest: "{{ incus_repo_file }}"
    content: |
      Enabled: yes
      Types: deb
      URIs: https://pkgs.zabbly.com/incus/lts-{{ incus_lts_version }}
      Suites: {{ ansible_distribution_release }}
      Components: main
      Architectures: {{ incus_architecture }}
      Signed-By: {{ incus_gpg_path }}
    mode: '0644'